name: preview-deploy (봇 위젯 검증용)

# 운영(main, unified-deploy)과 완전히 분리된 '프리뷰' 배포.
#  - bot-widget 브랜치에 push 될 때만 실행.
#  - 같은 ink-korea 프로젝트의 '프리뷰' 브랜치(bot-preview)로 배포 →
#    운영 주소(ink-korea.pages.dev)는 절대 안 바뀜.
#  - 결과 주소: https://bot-preview.ink-korea.pages.dev
on:
  push:
    branches: [bot-widget]

concurrency:
  group: preview-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (셸/운영/헬스 = 이 repo, bot-widget 브랜치)
        uses: actions/checkout@v4

      - name: Checkout 상품(product-dashboard)
        uses: actions/checkout@v4
        with:
          repository: zoids901-debug/product-dashboard
          path: _src/product-dashboard
          token: ${{ secrets.GH_PAT }}

      - name: Checkout 손익(pl-dashboard)
        uses: actions/checkout@v4
        with:
          repository: zoids901-debug/pl-dashboard
          path: _src/pl-dashboard
          token: ${{ secrets.GH_PAT }}

      - name: Checkout 테이블린(tablin-dashboard)
        uses: actions/checkout@v4
        with:
          repository: zoids901-debug/tablin-dashboard
          path: _src/tablin-dashboard
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 통합 dist 빌드
        run: python scripts/build_unified.py

      - name: Cloudflare Pages 프리뷰 배포 (bot-preview 브랜치)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy dist --project-name=ink-korea --branch=bot-preview --commit-dirty=true
