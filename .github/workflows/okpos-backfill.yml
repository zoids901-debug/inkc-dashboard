name: OK포스 Backfill (연 단위)

on:
  workflow_dispatch:
    inputs:
      from_year:
        description: '시작 연도 (YYYY)'
        required: true
        default: '2024'
      to_year:
        description: '끝 연도 (YYYY)'
        required: true
        default: '2024'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install playwright requests
          python -m playwright install --with-deps chromium

      - name: Run backfill
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO:  zoids901-debug/inkc-dashboard
          OKPOS_ID: ${{ secrets.OKPOS_ID }}
          OKPOS_PW: ${{ secrets.OKPOS_PW }}
          TOSS_ID:  ${{ secrets.TOSS_ID }}
          TOSS_PW:  ${{ secrets.TOSS_PW }}
        run: |
          python scripts/okpos_backfill.py "${{ inputs.from_year }}" "${{ inputs.to_year }}"

      - name: Show generated files
        run: |
          echo "=== ops_data/raw_okpos/ ==="
          ls -la ops_data/raw_okpos/ || echo "(empty or missing)"
          echo "=== git status ==="
          git status --short

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw_okpos_${{ inputs.from_year }}_${{ inputs.to_year }}
          path: ops_data/raw_okpos/
          if-no-files-found: warn

      - name: Commit & push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops_data/raw_okpos/
          if git diff --cached --quiet; then
            echo "변경 없음 — commit 생략"
            exit 0
          fi
          git commit -m "backfill: OK포스 raw ${{ inputs.from_year }}~${{ inputs.to_year }}"
          echo "=== push 시도 ==="
          git push origin HEAD:main 2>&1 || (echo "push 1차 실패 — pull 후 재시도"; git pull --rebase origin main; git push origin HEAD:main)
