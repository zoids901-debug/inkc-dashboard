name: CubePOS Cloud Diag (temp)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Cube cloud diag
        env:
          CUBEPOS_ID: ${{ secrets.CUBEPOS_ID }}
          CUBEPOS_PW: ${{ secrets.CUBEPOS_PW }}
        run: python scripts/cube_cloud_diag.py
