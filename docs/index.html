<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인케이코리아 통합 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  /* 테이블린 탭은 자체 헤더/컨트롤을 가진 독립 대시보드 — 통합 컨트롤바 숨김 */
  body[data-tab="tablin"] .ctrl-bar { display: none; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">인케이<em>코리아</em> 통합 대시보드</div>
  <div class="hdr-tabs" role="tablist">
    <span class="hdr-group">인크</span>
    <button class="hdr-tab" data-tab="ops">운영</button>
    <button class="hdr-tab" data-tab="product">상품</button>
    <button class="hdr-tab" data-tab="pl">손익</button>
    <span class="hdr-group-sep"></span>
    <span class="hdr-group">테이블린</span>
    <button class="hdr-tab" data-tab="tablin">운영시트</button>
  </div>
</div>

<!-- 컨트롤 바 -->
<div class="ctrl-bar">
  <div class="presets" id="presets">
    <button class="preset-btn ops-only" data-p="yesterday">어제</button>
    <button class="preset-btn ops-only" data-p="week">이번 주</button>
    <button class="preset-btn active" data-p="mtd">이번 달</button>
    <button class="preset-btn" data-p="last_month">지난 달</button>
    <button class="preset-btn month-trend" data-p="3m">최근 3개월</button>
    <button class="preset-btn month-trend" data-p="6m">최근 6개월</button>
    <button class="preset-btn" data-p="ytd">올해</button>
    <button class="preset-btn" data-p="last_year">작년</button>
  </div>

  <div class="ctrl-sep"></div>

  <div class="date-range">
    <span class="dr-label">📅</span>
    <input type="text" id="dateRangeInput" placeholder="날짜 범위 선택" readonly>
  </div>

  <div class="ctrl-sep"></div>

  <span class="pills-label">매장</span>
  <div class="store-pills" id="storePills">
    <button class="pill on" id="pillAll">전체</button>
  </div>

  <button id="btnExcelUnified" title="현재 탭의 엑셀 다운로드"
    style="margin-left:auto;border:1px solid #10B981;background:#10B981;color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
    <span>⬇</span><span>엑셀</span>
  </button>
</div>

<!-- 본문 (iframe 임베드 — Step 2~4 임시. 추후 인라인 전환 예정) -->
<div class="main main-frame">
  <section id="tab-product" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/product-dashboard/" loading="lazy"></iframe>
  </section>
  <section id="tab-ops" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/inkc-dashboard/ops-only/" loading="lazy"></iframe>
  </section>
  <section id="tab-pl" class="tab-panel" hidden>
    <div class="subtabs">
      <button class="subtab active" data-subtab="dashboard">대시보드</button>
      <button class="subtab" data-subtab="upload">엑셀 업로드</button>
    </div>
    <div id="pl-dashboard" class="subtab-panel">
      <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/pl-dashboard/" loading="lazy"></iframe>
    </div>
    <div id="pl-upload" class="subtab-panel" hidden>
      <iframe class="tab-frame upload-frame" data-src="https://zoids901-debug.github.io/pl-dashboard/uploader.html" loading="lazy"></iframe>
    </div>
  </section>
  <section id="tab-tablin" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/tablin-dashboard/" loading="lazy"></iframe>
  </section>
</div>

<script src="scripts/shared.js"></script>
</body>
</html>
