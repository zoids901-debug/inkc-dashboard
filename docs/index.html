<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>인케이코리아 통합 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>

<!-- 헤더 -->
<div class="hdr">
  <div class="hdr-title">인케이<em>코리아</em> 통합 대시보드</div>
  <div class="hdr-tabs" role="tablist">
    <span class="hdr-group">인크</span>
    <button class="hdr-tab" data-tab="ops">운영</button>
    <button class="hdr-tab" data-tab="product">상품</button>
    <button class="hdr-tab" data-tab="pl">손익</button>
    <span class="hdr-group-sep"></span>
    <span class="hdr-group">테이블린</span>
    <button class="hdr-tab" data-tab="tablin">운영</button>
  </div>
  <div class="hdr-health" id="hdrHealth" hidden onclick="toggleHealthPanel()" title="데이터 건강검진 — 클릭해서 상세 보기">
    <span class="hh-icon" id="hhIcon">·</span>
    <span class="hh-label" id="hhLabel">확인 중…</span>
  </div>
</div>

<!-- 데이터 상태 상세 패널 -->
<div class="health-panel" id="healthPanel" hidden></div>

<!-- 컨트롤 바 -->
<div class="ctrl-bar">
  <div class="presets" id="presets">
    <button class="preset-btn ops-only" data-p="yesterday">어제</button>
    <button class="preset-btn ops-only" data-p="week">이번 주</button>
    <button class="preset-btn active" data-p="mtd">이번 달</button>
    <button class="preset-btn" data-p="last_month">지난 달</button>
    <button class="preset-btn has-quarter" data-p="ytd">올해 <span class="q-caret">▾</span></button>
    <button class="preset-btn has-quarter" data-p="last_year">작년 <span class="q-caret">▾</span></button>
  </div>
  <div id="presetPopup" class="preset-popup" hidden></div>

  <div class="ctrl-sep"></div>

  <div class="date-range">
    <span class="dr-label">📅</span>
    <input type="text" id="dateRangeInput" placeholder="날짜 범위 선택" readonly>
  </div>

  <div class="ctrl-sep"></div>

  <span class="pills-label">매장</span>
  <div class="store-pills" id="storePills">
    <button class="pill on" id="pillAll">전체</button>
  </div>

  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <button id="btnVatUnified" class="ops-only" title="VAT(부가세) 제외 기준으로 보기 — 매출/목표/객단가/생산성 모두 ÷1.1. 달성률·전년비는 동일"
      style="border:1px solid #CBD5E1;background:#fff;color:#475569;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px">
      <span id="vatLabelUnified">VAT 포함</span>
    </button>
    <button id="btnExcelUnified" title="현재 탭의 엑셀 다운로드"
      style="border:1px solid #10B981;background:#10B981;color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px">
      <span>⬇</span><span>엑셀</span>
    </button>
  </div>
</div>

<!-- 본문 (iframe 임베드 — Step 2~4 임시. 추후 인라인 전환 예정) -->
<div class="main main-frame">
  <section id="tab-product" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/product-dashboard/" loading="lazy"></iframe>
  </section>
  <section id="tab-ops" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/inkc-dashboard/ops-only/" loading="lazy"></iframe>
  </section>
  <section id="tab-pl" class="tab-panel" hidden>
    <div class="subtabs">
      <button class="subtab active" data-subtab="dashboard">대시보드</button>
      <button class="subtab" data-subtab="upload">엑셀 업로드</button>
    </div>
    <div id="pl-dashboard" class="subtab-panel">
      <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/pl-dashboard/" loading="lazy"></iframe>
    </div>
    <div id="pl-upload" class="subtab-panel" hidden>
      <iframe class="tab-frame upload-frame" data-src="https://zoids901-debug.github.io/pl-dashboard/uploader.html" loading="lazy"></iframe>
    </div>
  </section>
  <section id="tab-tablin" class="tab-panel" hidden>
    <iframe class="tab-frame" data-src="https://zoids901-debug.github.io/tablin-dashboard/" loading="lazy"></iframe>
  </section>
</div>

<script src="scripts/shared.js"></script>

<style>
.hdr-health{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:14px;background:rgba(255,255,255,0.08);color:#fff;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);margin-left:auto;transition:background 0.2s}
.hdr-health:hover{background:rgba(255,255,255,0.16)}
.hdr-health.ok{border-color:#10B981}
.hdr-health.warn{border-color:#F59E0B;background:rgba(245,158,11,0.15)}
.hdr-health.bad{border-color:#EF4444;background:rgba(239,68,68,0.15)}
.hh-icon{font-size:14px;line-height:1}
.health-panel{position:fixed;top:54px;right:16px;width:380px;max-width:calc(100vw - 32px);max-height:60vh;overflow-y:auto;background:#fff;border:1px solid #E2E8F0;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:1000;font-size:12px}
.health-panel-hdr{padding:10px 14px;border-bottom:1px solid #E2E8F0;background:#F8FAFC;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center}
.health-panel-hdr .hp-title{font-weight:700;color:#1E293B}
.health-panel-hdr .hp-close{cursor:pointer;color:#94A3B8;font-size:14px;padding:0 4px}
.health-panel-body{padding:10px 14px}
.hp-store{padding:8px 0;border-bottom:1px solid #F1F5F9}
.hp-store:last-child{border-bottom:none}
.hp-store-hdr{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hp-store-icon{font-weight:700;font-size:13px}
.hp-store-icon.ok{color:#10B981}
.hp-store-icon.warn{color:#F59E0B}
.hp-store-icon.bad{color:#EF4444}
.hp-store-icon.missing{color:#EF4444}
.hp-store-icon.info{color:#0EA5E9}
.hp-section-title{padding:8px 14px 4px;font-weight:700;color:#334155;background:#F1F5F9;border-top:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0;font-size:11px}
.hp-store-name{font-weight:600;color:#1E293B}
.hp-store-z{color:#94A3B8;font-size:11px;margin-left:auto;font-variant-numeric:tabular-nums}
.hp-store-date{color:#64748B;font-size:10px;margin-left:auto;background:#F1F5F9;padding:1px 6px;border-radius:8px;font-weight:500}
.hp-store-msg{color:#475569;font-size:11px;line-height:1.5;padding-left:20px}
.hp-footer{padding:8px 14px;background:#F8FAFC;border-top:1px solid #E2E8F0;font-size:10px;color:#94A3B8;border-radius:0 0 8px 8px}
</style>
<script>
(function() {
  const HEALTH_URL = 'ops_data/health.json';
  let _health = null;
  async function loadHealth() {
    try {
      const r = await fetch(HEALTH_URL + '?v=' + Date.now());
      if (!r.ok) throw new Error('HTTP ' + r.status);
      _health = await r.json();
      renderHealthChip();
    } catch (e) {
      console.warn('[health] load failed:', e);
      const chip = document.getElementById('hdrHealth');
      if (chip) chip.hidden = true;
    }
  }
  function renderHealthChip() {
    if (!_health) return;
    const chip = document.getElementById('hdrHealth');
    const icon = document.getElementById('hhIcon');
    const lbl = document.getElementById('hhLabel');
    if (!chip) return;
    chip.hidden = false;
    chip.className = 'hdr-health ' + (_health.overall || 'ok');
    const sm = _health.summary || {};
    const total = (sm.ok||0) + (sm.warn||0) + (sm.bad||0) + (sm.missing||0);
    const badCnt = (sm.bad||0) + (sm.missing||0);
    const warnCnt = sm.warn||0;
    if (_health.overall === 'bad') {
      icon.textContent = '✗';
      lbl.textContent = `데이터 이상 (${badCnt}/${total})`;
    } else if (_health.overall === 'warn') {
      icon.textContent = '⚠';
      lbl.textContent = `데이터 의심 (${warnCnt}/${total})`;
    } else {
      icon.textContent = '✓';
      lbl.textContent = `데이터 정상 (${total}/${total})`;
    }
  }
  window.toggleHealthPanel = function() {
    const panel = document.getElementById('healthPanel');
    if (!panel || !_health) return;
    if (!panel.hidden) { panel.hidden = true; return; }
    const stores = _health.stores || [];
    const rows = stores.map(s => {
      const icon = {ok:'✓', warn:'⚠', bad:'✗', missing:'✗'}[s.status] || '·';
      const dateTag = s.delayed ? `<span class="hp-store-date">${s.target_date} 데이터</span>` : '';
      const msg = s.messages && s.messages.length ? s.messages.join(' / ') : '평소 패턴 범위 (정상)';
      return `<div class="hp-store">
        <div class="hp-store-hdr">
          <span class="hp-store-icon ${s.status}">${icon}</span>
          <span class="hp-store-name">${s.store}점</span>
          ${dateTag}
        </div>
        <div class="hp-store-msg">${msg}</div>
      </div>`;
    }).join('');
    panel.innerHTML = `
      <div class="health-panel-hdr">
        <span class="hp-title">데이터 건강검진 · ${_health.target_date} (${_health.dow}요일)</span>
        <span class="hp-close" onclick="event.stopPropagation();document.getElementById('healthPanel').hidden=true">×</span>
      </div>
      <div class="health-panel-body">${rows}</div>
      ${_health.cross_check ? `
        <div class="hp-section-title">교차 검증 · OK포스 ↔ 운영 대시보드 (${_health.cross_check.yyyy_mm || ''})</div>
        <div class="health-panel-body">${
          _health.cross_check.overall === 'no_data'
            ? `<div class="hp-store-msg" style="padding:4px 0;color:#94A3B8">${_health.cross_check.message || '데이터 없음'}</div>`
            : (_health.cross_check.stores || []).map(s => {
                const cIcon = {ok:'✓', warn:'⚠', bad:'✗', info:'ⓘ'}[s.level] || '·';
                const diffFmt = (Math.abs(s.diff) >= 1e8 ? (s.diff/1e8).toFixed(2)+'억' :
                               Math.abs(s.diff) >= 1e4 ? Math.round(s.diff/1e4).toLocaleString()+'만' :
                               s.diff.toLocaleString())+'원';
                const sign = s.diff > 0 ? '+' : '';
                return `<div class="hp-store">
                  <div class="hp-store-hdr">
                    <span class="hp-store-icon ${s.level}">${cIcon}</span>
                    <span class="hp-store-name">${s.store}점</span>
                    <span class="hp-store-date">${sign}${diffFmt} (${s.pct.toFixed(1)}%)</span>
                  </div>
                  <div class="hp-store-msg">${s.message}</div>
                </div>`;
              }).join('')
        }</div>
      ` : ''}
      <div class="hp-footer">학습 기간: 최근 3년 매장×요일별 평균 · 검사 시각: ${_health.checked_at}<br>수원점은 1일 딜레이로 이틀 전 데이터로 검사합니다. 교차 검증은 OK포스 원본과 대시보드 표시값의 월 합산 차이를 봅니다.</div>
    `;
    panel.hidden = false;
  };
  // 외부 클릭으로 닫기
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('healthPanel');
    const chip = document.getElementById('hdrHealth');
    if (!panel || panel.hidden) return;
    if (panel.contains(e.target) || (chip && chip.contains(e.target))) return;
    panel.hidden = true;
  });
  // 페이지 로드 후 한 번
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadHealth);
  else loadHealth();
})();
</script>
</body>
</html>
